<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>ZoomGate Worker</title></head>
<body>
<div id="zoomRoot" style="width:1px;height:1px;overflow:hidden;"></div>

<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

  window.__zoomReady = false;
  window.__zoomClient = null;
